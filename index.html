<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Slip Generator — Shreeji Enterprise</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #534AB7;
      --bg: #F7F6FB;
      --surface: #FFFFFF;
      --border: #E2DFEF;
      --text: #1A1830;
      --text2: #6B6880;
      --radius-md: 10px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .topbar { background: var(--primary); color: white; padding: 12px 2rem; display: flex; justify-content: space-between; align-items: center; }
    .tab-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; gap: 10px; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
    .tab-btn { padding: 14px 18px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 600; color: #6B6880; border-bottom: 3px solid transparent; white-space: nowrap; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .container { max-width: 860px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }
    .panel { display: none; }
    .panel.active { display: block; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(83,74,183,0.05); }
    .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #9E9BB5; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 8px; }
    .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    
    label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; }
    input:focus { border-color: var(--primary); }
    
    .item-row { display: grid; grid-template-columns: 2fr 1.2fr 1fr 1fr 40px; gap: 8px; margin-bottom: 8px; align-items: center; }
    .btn-del-item { background: #FEF2F2; color: #E24B4A; border: 1px solid #FECACA; padding: 8px; cursor: pointer; border-radius: 6px; }

    .upload-zone { border: 2px dashed var(--border); padding: 25px; text-align: center; cursor: pointer; border-radius: 8px; background: #fcfcff; }
    .btn-primary { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; font-size: 15px; }
    
    .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .history-table th, .history-table td { padding: 12px; border: 1px solid #eee; text-align: left; font-size: 13px; }

    #bill-output { background: white; padding: 2rem; border-radius: 8px; color: #000; }

    @media print {
      .no-print { display: none !important; }
      body { background: white; }
      .container { max-width: 100%; padding: 0; }
      #bill-output { border: none !important; box-shadow: none !important; }
    }
  </style>
</head>
<body>

<div class="topbar no-print">
  <div style="font-weight: bold; font-size: 16px;">Job Slip Generator</div>
  <div style="font-size: 12px; opacity: 0.8;">Admin: Shiroya Darsh</div>
</div>

<div class="tab-bar no-print">
  <button class="tab-btn active" onclick="switchTab('form')">📝 બિલ ભરો</button>
  <button class="tab-btn" onclick="switchTab('preview')">👁 પ્રિવ્યૂ જુઓ</button>
  <button class="tab-btn" onclick="switchTab('history')">📜 હિસ્ટ્રી</button>
</div>

<div class="container">
  
  <div class="panel active" id="tab-form">
    
    <div class="card">
      <div class="card-title">કંપની માહિતી</div>
      <div class="form-grid">
        <div class="form-group full"><label>કંપનીનું નામ</label><input type="text" id="company-name" value="Shreeji Enterprise"></div>
        <div class="form-group full"><label>સરનામું</label><input type="text" id="company-addr" value="8, dharmanandan soc., varachha, surat"></div>
        <div class="form-group"><label>ફોન નંબર</label><input type="text" id="company-phone" value="9924562646"></div>
        <div class="form-group"><label>બનાવનાર (Created By)</label><input type="text" id="created-by" value="Vijaybhai Antique Tex"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Job માહિતી</div>
      <div class="form-grid">
        <div class="form-group"><label>Jobberનું નામ</label><input type="text" id="jobber-name" placeholder="Name"></div>
        <div class="form-group"><label>Jobber ફોન</label><input type="text" id="jobber-phone" placeholder="Phone"></div>
        <div class="form-group"><label>Slip No.</label><input type="text" id="jobslip-no" placeholder="101"></div>
        <div class="form-group"><label>Design No.</label><input type="text" id="design-no" placeholder="DES-99"></div>
        <div class="form-group"><label>Issue Date</label><input type="date" id="issue-date"></div>
        <div class="form-group"><label>Expected Date</label><input type="date" id="exp-date"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Item List</div>
      <div id="items-list"></div>
      <button onclick="addItem()" style="margin-top:10px; padding: 8px 15px; cursor:pointer; background: #EEEDFE; color: var(--primary); border: 1px dashed var(--primary); border-radius:6px; font-weight:600;">+ નવી આઈટમ ઉમેરો</button>
    </div>

    <div class="card">
      <div class="card-title">Design Photos</div>
      <div class="upload-zone" onclick="document.getElementById('photo-input').click()">
        <p>📷 ફોટા અપલોડ કરવા ક્લિક કરો</p>
      </div>
      <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)" />
      <div id="photos-preview" style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;"></div>
    </div>

    <div class="card">
      <div class="card-title">Terms & Notes</div>
      <textarea id="terms" rows="2">Items lost or damaged are the responsibility of the jobber. Please deliver on time.</textarea>
    </div>

    <button class="btn-primary" onclick="generatePreview(true)">સેવ કરો અને પ્રિવ્યૂ જુઓ →</button>
  </div>

  <div class="panel" id="tab-preview">
    <div class="no-print" style="margin-bottom:15px; display:flex; gap:10px;">
      <button onclick="switchTab('form')" style="padding:10px 20px; cursor:pointer; border-radius:6px; border:1px solid #ccc; background:white;">← સુધારો</button>
      <button onclick="window.print()" style="padding:10px 20px; background:var(--primary); color:white; border:none; cursor:pointer; font-weight:bold; border-radius:6px;">🖨 પ્રિન્ટ</button>
      <button onclick="downloadPDF()" style="padding:10px 20px; background:#1D9E75; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:6px;">⬇ PDF ડાઉનલોડ</button>
    </div>
    <div id="bill-output" style="border: 1px solid #ddd;"></div>
  </div>

  <div class="panel" id="tab-history">
    <div class="card">
      <div class="card-title">બનાવેલા બિલોની યાદી</div>
      <table class="history-table">
        <thead>
          <tr style="background:#f5f5f5;"><th>Slip No</th><th>Jobber</th><th>Date</th><th>Total</th><th>Action</th></tr>
        </thead>
        <tbody id="history-list"></tbody>
      </table>
      <button onclick="clearHistory()" style="margin-top:20px; color:red; border:none; background:none; cursor:pointer; font-size:12px; font-weight:600;">🗑 બધી હિસ્ટ્રી સાફ કરો</button>
    </div>
  </div>
</div>

<script>
  let items = []; let photos = []; let itemCounter = 0;

  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    const btns = document.querySelectorAll('.tab-btn');
    if(tab === 'form') btns[0].classList.add('active');
    else if(tab === 'preview') btns[1].classList.add('active');
    else { btns[2].classList.add('active'); loadHistory(); }
  }

  function addItem(d='Saree', c='No Color', q='150', r='0') {
    const id = ++itemCounter;
    items.push({ id, dresType: d, color: c, qty: q, rate: r });
    renderItems();
  }

  function renderItems() {
    const list = document.getElementById('items-list');
    list.innerHTML = items.map(item => `
      <div class="item-row">
        <input type="text" value="${item.dresType}" onchange="updateItem(${item.id},'dresType',this.value)">
        <input type="text" value="${item.color}" onchange="updateItem(${item.id},'color',this.value)">
        <input type="number" value="${item.qty}" onchange="updateItem(${item.id},'qty',this.value)">
        <input type="number" value="${item.rate}" onchange="updateItem(${item.id},'rate',this.value)">
        <button class="btn-del-item" onclick="items=items.filter(i=>i.id!=${item.id}); renderItems();">×</button>
      </div>
    `).join('');
  }

  function updateItem(id, f, v) { const item = items.find(i => i.id === id); if(item) item[f] = v; }

  function handlePhotos(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => { photos.push({ src: ev.target.result }); renderPhotoPreview(); };
      reader.readAsDataURL(file);
    });
  }

  function renderPhotoPreview() {
    document.getElementById('photos-preview').innerHTML = photos.map((p, i) => `
      <div style="position: relative; width: 70px; height: 70px;">
        <img src="${p.src}" style="width:100%; height:100%; object-fit:cover; border-radius:4px; border:1px solid #ddd;">
        <button onclick="photos.splice(${i},1); renderPhotoPreview();" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border:none; border-radius:50%; width:18px; height:18px; cursor:pointer; font-size:10px;">×</button>
      </div>
    `).join('');
  }

  function val(id) { return (document.getElementById(id)?.value || ''); }

  function saveToHistory(jobber, slipNo, date, total) {
    let history = JSON.parse(localStorage.getItem('jobslips_final')) || [];
    history.push({ jobber, slipNo, date, total });
    localStorage.setItem('jobslips_final', JSON.stringify(history));
  }

  function loadHistory() {
    const history = JSON.parse(localStorage.getItem('jobslips_final')) || [];
    const list = document.getElementById('history-list');
    if(history.length === 0) { list.innerHTML = `<tr><td colspan="5" style="text-align:center;">ખાલી છે.</td></tr>`; return; }
    list.innerHTML = history.reverse().map((h, i) => `
      <tr><td><b>#${h.slipNo}</b></td><td>${h.jobber}</td><td>${h.date}</td><td>₹${h.total}</td>
      <td><button onclick="deleteHistory(${history.length-1-i})" style="color:red; border:none; cursor:pointer; font-weight:600;">Delete</button></td></tr>
    `).join('');
  }

  function deleteHistory(index) {
    let history = JSON.parse(localStorage.getItem('jobslips_final')) || [];
    history.splice(index, 1);
    localStorage.setItem('jobslips_final', JSON.stringify(history));
    loadHistory();
  }

  function clearHistory() { if(confirm("બધું સાફ કરવું છે?")) { localStorage.removeItem('jobslips_final'); loadHistory(); } }

  function generatePreview(save = false) {
    let totalQty = 0; let totalAmt = 0;
    const rows = items.map(item => {
      const q = parseFloat(item.qty) || 0;
      const r = parseFloat(item.rate) || 0;
      const amt = q * r;
      totalQty += q; totalAmt += amt;
      return `<tr>
        <td style="border:1.5px solid #000; padding:8px;">${item.dresType}</td>
        <td style="border:1.5px solid #000; padding:8px;">${item.color}</td>
        <td style="border:1.5px solid #000; padding:8px;">${q}</td>
        <td style="border:1.5px solid #000; padding:8px;">₹${r}</td>
        <td style="border:1.5px solid #000; padding:8px;">₹${amt.toFixed(2)}</td>
      </tr>`;
    }).join('');

    const photoHtml = photos.map(p => `<img src="${p.src}" style="width:80px; height:80px; object-fit:cover; border:1.5px solid #000; margin-right:5px; border-radius:4px;">`).join('');

    if(save) saveToHistory(val('jobber-name'), val('jobslip-no'), val('issue-date'), totalAmt.toFixed(0));

    document.getElementById('bill-output').innerHTML = `
      <div style="text-align:center; font-weight:bold; letter-spacing:4px; margin-bottom:10px;">JOBSLIP</div>
      <div style="border-bottom: 2px solid #000; padding-bottom:10px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
        <div><h2 style="margin:0;">${val('company-name')}</h2><p style="margin:2px 0; font-size:11px;">${val('company-addr')}</p><p style="margin:0; font-size:11px;">📞 ${val('company-phone')}</p></div>
        <div style="text-align:right; font-size:12px;"><p>Slip No: <b>#${val('jobslip-no')}</b></p><p>Date: <b>${val('issue-date')}</b></p></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:10px;">
        <div>Jobber: <b>${val('jobber-name')}</b><br>Ph: ${val('jobber-phone')}</div>
        <div style="text-align:right;">Design: <span style="border:1.5px solid #000; padding:2px 8px; font-weight:bold; background:#eee;">${val('design-no')}</span></div>
      </div>
      <table style="width:100%; border-collapse:collapse; border:1.5px solid #000; font-size:12px; margin-bottom:10px;">
        <thead><tr style="background:#eee;">
          <th style="border:1.5px solid #000; padding:8px; text-align:left;">Item Name</th>
          <th style="border:1.5px solid #000; padding:8px; text-align:left;">Color</th><th style="border:1.5px solid #000; padding:8px; text-align:left;">Qty</th>
          <th style="border:1.5px solid #000; padding:8px; text-align:left;">Rate</th><th style="border:1.5px solid #000; padding:8px; text-align:left;">Amount</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot style="background:#f9f9f9; font-weight:bold;">
          <tr><td colspan="2" style="border:1.5px solid #000; padding:8px; text-align:center;">TOTAL</td>
          <td style="border:1.5px solid #000; padding:8px;">${totalQty} Pcs</td><td style="border:1.5px solid #000; padding:8px;">-</td>
          <td style="border:1.5px solid #000; padding:8px;">₹${totalAmt.toFixed(0)}</td></tr>
        </tfoot>
      </table>
      <div style="display:flex; flex-wrap:wrap; gap:5px;">${photoHtml}</div>
      <div style="margin-top:15px; font-size:10px; color:#555; border-top:1px solid #000; padding-top:10px;"><b>Terms:</b> ${val('terms')}</div>
      <div style="margin-top:20px; display:flex; justify-content:space-between; font-size:11px;">
        <span>Created by: <b>${val('created-by')}</b></span><span style="color:#534AB7; font-weight:bold;">Powered by: DVS.AI</span>
      </div>
    `;
    switchTab('preview');
  }

  function downloadPDF() {
    const element = document.getElementById('bill-output');
    html2pdf().from(element).set({
      margin: 0.3, filename: 'Slip-' + val('jobslip-no') + '.pdf',
      html2canvas: { scale: 3 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    }).save();
  }

  window.onload = function() {
    addItem(); const today = new Date().toISOString().split('T')[0];
    document.getElementById('issue-date').value = today; document.getElementById('exp-date').value = today;
  };
</script>
</body>
</html>
